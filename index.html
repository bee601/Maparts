<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Map Schematic Generator</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(5, 128px); /* 5 Spalten wie im Bild */
            gap: 2px; 
            justify-content: center; 
            margin-top: 20px;
        }
        canvas { border: 1px solid #444; width: 128px; height: 128px; }
        .controls { padding: 20px; background: #333; }
    </style>
</head>
<body>
    <h1>Map Grid Generator</h1>
    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        <p>Das Bild wird automatisch in 128x128 Blöcke unterteilt.</p>
    </div>
    <div id="outputGrid" class="grid-container"></div>

    <script src="script.js"></script>
</body>
</html>
