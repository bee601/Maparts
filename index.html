<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Map Grid Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .controls { background: #333; padding: 20px; border-radius: 10px; display: inline-block; margin-bottom: 20px; }
        #outputGrid { 
            display: grid; 
            grid-template-columns: repeat(5, 128px); /* Genau 5 Spalten wie im Bild */
            gap: 2px; 
            justify-content: center;
            background: #000;
            padding: 5px;
            width: fit-content;
            margin: 0 auto;
        }
        canvas { width: 128px; height: 128px; display: block; image-rendering: pixelated; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>Map Grid Generator (5x5)</h1>
    <div class="controls">
        <input type="file" id="upload" accept="image/*"><br>
        <button id="downloadBtn" style="display:none;">Grid als Bild speichern</button>
    </div>
    <div id="outputGrid"></div>

    <script src="script.js"></script>
</body>
</html><!DOCTYPE html>
